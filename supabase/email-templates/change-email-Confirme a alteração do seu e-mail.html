<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirme a alteração do seu e-mail - MAIN CNX</title>
</head>

<body
    style="margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #030712; color: #f9fafb;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%"
        style="max-width: 600px; margin: 40px auto; background: #111827; border-radius: 16px; overflow: hidden; border: 1px solid #374151;">
        <!-- Header -->
        <tr>
            <td align="center" style="padding: 40px 0; background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);">
                <h1
                    style="margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; color: #ffffff;">
                    MAIN CNX</h1>
            </td>
        </tr>

        <!-- Content -->
        <tr>
            <td style="padding: 40px 32px;">
                <h2 style="margin: 0 0 16px; font-size: 20px; font-weight: 600;">Alteração de E-mail</h2>
                <p style="margin: 0 0 24px; line-height: 1.6; color: #9ca3af;">Você solicitou a alteração do e-mail da
                    sua conta para <strong>{{ .Email }}</strong>. Por favor, confirme a mudança clicando no botão
                    abaixo:</p>

                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                    <tr>
                        <td align="center">
                            <a href="{{ .ConfirmationURL }}"
                                style="display: inline-block; padding: 16px 32px; background-color: #4f46e5; color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px;">Confirmar
                                Novo E-mail</a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- Footer -->
        <tr>
            <td style="padding: 32px; border-top: 1px solid #1f2937; background-color: #111827; text-align: center;">
                <p style="margin: 0; font-size: 12px; color: #4b5563;">&copy; 2026 MAIN CNX. Todos os direitos
                    reservados.</p>
                <div style="display: none;">
                    Token: {{ .Token }} | Hash: {{ .TokenHash }} | Site: {{ .SiteURL }}
                </div>
            </td>
        </tr>
    </table>
</body>

</html>
